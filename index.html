<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scan & OCR Search</title>
    <!-- Tailwind CSS for modern, responsive UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html5-qrcode library for robust barcode scanning -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- Tesseract.js for OCR (Text Recognition) -->
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        /* Make the reader absolutely fill the background of its container */
        #reader {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            background: black;
        }
        
        /* Force the video element to cover the entire screen area */
        #reader video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }
        
        /* Hide the library's default UI elements */
        #reader__dashboard_section_csr,
        #reader__header_message,
        #reader__status_span { 
            display: none !important; 
        }

        /* Scanning animation line */
        .scan-line {
            position: absolute;
            top: 20%;
            left: 50%;
            width: 80%;
            height: 2px;
            background: rgba(59, 130, 246, 0.8);
            box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.4);
            transform: translateX(-50%);
            animation: scanMove 2s infinite ease-in-out;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { top: 25%; }
            50% { top: 75%; }
            100% { top: 25%; }
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- Main Content Interface -->
    <div class="max-w-md mx-auto p-4 sm:p-6">
        <header class="mb-8 text-center pt-8">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Smart Scan & OCR</h1>
            <p class="text-slate-500 text-sm mt-1">Barcode & Text recognition for quick lookup</p>
        </header>

        <!-- Search Section -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
            <label for="search-input" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Search Query</label>
            <div class="relative group">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Barcode or text..." 
                    class="w-full pl-4 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg font-medium"
                >
                <button 
                    id="perform-search"
                    class="absolute right-2 top-2 p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors shadow-md active:scale-95"
                    title="Search"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
            
            <div id="result-info" class="mt-4 text-center hidden">
                <span id="badge" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                    <svg class="mr-1.5 h-2 w-2 text-green-400" fill="currentColor" viewBox="0 0 8 8">
                        <circle cx="4" cy="4" r="3" />
                    </svg>
                    Detected
                </span>
                <p id="format-display" class="text-xs text-slate-400 mt-1 uppercase font-bold tracking-widest"></p>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 gap-3">
            <button 
                id="start-btn" 
                class="flex items-center justify-center gap-3 w-full py-5 bg-slate-900 text-white font-bold rounded-2xl shadow-xl hover:bg-slate-800 active:scale-[0.98] transition-all"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <circle cx="12" cy="13" r="3" />
                </svg>
                Live Camera Scan
            </button>

            <div class="relative">
                <input type="file" id="qr-input-file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <button 
                    id="upload-ui-btn"
                    class="flex items-center justify-center gap-3 w-full py-4 bg-white border-2 border-blue-500 text-blue-600 font-bold rounded-2xl shadow-sm hover:bg-blue-50 transition-all"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Upload / Recognize Text
                </button>
            </div>
            
            <div id="local-warning" class="hidden mt-4 p-4 bg-amber-50 rounded-xl border border-amber-200">
                <p class="text-[11px] text-amber-800 leading-snug">
                    <span class="font-bold">Local File Detected:</span> Use <span class="text-blue-600 font-bold">Upload</span> to process images or barcodes locally.
                </p>
            </div>
        </div>
    </div>

    <!-- FULL SCREEN SCANNER OVERLAY -->
    <div id="scanner-overlay" class="fixed inset-0 z-50 bg-black hidden transition-opacity duration-300">
        <!-- The Camera Feed (Background) -->
        <div id="reader" class="absolute inset-0 z-0"></div>

        <!-- Overlay UI (Foreground) -->
        <div class="absolute inset-0 z-10 flex flex-col pointer-events-none">
            <!-- Header -->
            <div class="p-6 flex justify-between items-center pointer-events-auto">
                <h2 class="text-white font-semibold text-lg drop-shadow-md">Scan Barcode or Text</h2>
                <button id="close-scanner" class="p-2 bg-white/10 hover:bg-white/20 text-white rounded-full backdrop-blur-md transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Viewfinder Area -->
            <div class="flex-1 flex items-center justify-center">
                <div class="relative w-72 h-48 border-2 border-white/30 rounded-2xl">
                    <div class="scan-line"></div>
                    <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-blue-500"></div>
                    <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-blue-500"></div>
                    <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-blue-500"></div>
                    <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-blue-500"></div>
                </div>
            </div>

            <!-- Footer Controls -->
            <div class="p-8 bg-gradient-to-t from-black/80 to-transparent flex flex-col items-center gap-4 pointer-events-auto">
                <p class="text-slate-300 text-sm">Target barcode or tap for text recognition</p>
                <button id="capture-ocr-btn" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-full shadow-lg hover:bg-blue-500 active:scale-95 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Recognize Text (OCR)
                </button>
            </div>
        </div>
    </div>

    <!-- Processing Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-[110] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl flex flex-col items-center gap-4 shadow-2xl">
            <div class="loader"></div>
            <p class="font-bold text-slate-800">Processing Text...</p>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="fixed bottom-6 left-1/2 -translate-x-1/2 transform transition-all duration-300 translate-y-20 opacity-0 z-[120]">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-3 border border-slate-700">
            <span id="notif-message">Result captured</span>
        </div>
    </div>

    <script>
        let html5QrCode = null;
        let isScanning = false;

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('perform-search');
        const startBtn = document.getElementById('start-btn');
        const closeBtn = document.getElementById('close-scanner');
        const overlay = document.getElementById('scanner-overlay');
        const resultInfo = document.getElementById('result-info');
        const formatDisplay = document.getElementById('format-display');
        const notification = document.getElementById('notification');
        const notifMessage = document.getElementById('notif-message');
        const fileInput = document.getElementById('qr-input-file');
        const localWarning = document.getElementById('local-warning');
        const captureOcrBtn = document.getElementById('capture-ocr-btn');
        const loadingOverlay = document.getElementById('loading-overlay');

        if (location.protocol === 'file:') {
            localWarning.classList.remove('hidden');
            startBtn.classList.replace('bg-slate-900', 'bg-slate-400');
        }

        function showNotification(message, isError = false) {
            notifMessage.innerText = message;
            const container = notification.querySelector('div');
            container.className = isError 
                ? "bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-3" 
                : "bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-3 border border-slate-700";
            
            notification.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                notification.classList.add('translate-y-20', 'opacity-0');
            }, 5000);
        }

        async function handleResult(text, type) {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(150);
            }

            await stopScanning();

            searchInput.value = text;
            formatDisplay.innerText = type;
            resultInfo.classList.remove('hidden');
            
            showNotification(`Captured ${type}`);
            searchInput.classList.add('ring-4', 'ring-blue-500/20');
            searchInput.focus();
            setTimeout(() => {
                searchInput.classList.remove('ring-4', 'ring-blue-500/20');
            }, 1500);
        }

        // Tesseract OCR Logic
        async function runOCR(imageSource) {
            loadingOverlay.classList.remove('hidden');
            try {
                const result = await Tesseract.recognize(imageSource, 'eng');
                const text = result.data.text.trim().replace(/\n/g, ' ');
                
                if (text && text.length > 1) {
                    await handleResult(text, 'Text (OCR)');
                } else {
                    showNotification("Could not read any clear text.", true);
                }
            } catch (err) {
                console.error(err);
                showNotification("OCR Error: Text recognition failed.", true);
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }

        async function startScanning() {
            const isLocalServer = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            const isSecure = location.protocol === 'https:' || isLocalServer;

            if (location.protocol === 'file:') {
                showNotification("Live camera blocked on local files. Use 'Upload'.", true);
                return;
            }

            try {
                resultInfo.classList.add('hidden');
                overlay.classList.remove('hidden');
                overlay.style.display = 'flex'; // Use display flex for the overlay container
                overlay.style.opacity = '1';
                
                html5QrCode = new Html5Qrcode("reader");
                
                const config = { 
                    fps: 25, 
                    qrbox: (viewWidth, viewHeight) => {
                        const minDim = Math.min(viewWidth, viewHeight);
                        // Make the capture zone relative to the viewfinder UI
                        return { width: 280, height: 180 };
                    },
                    aspectRatio: window.innerWidth / window.innerHeight
                };

                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text, result) => handleResult(text, result.result.format.formatName)
                );

                isScanning = true;
            } catch (err) {
                console.error(err);
                overlay.classList.add('hidden');
                showNotification("Camera blocked. Use 'Upload' instead.", true);
            }
        }

        async function stopScanning() {
            if (html5QrCode && isScanning) {
                try {
                    await html5QrCode.stop();
                    html5QrCode.clear();
                } catch (err) {}
            }
            isScanning = false;
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.style.display = 'none';
            }, 300);
        }

        // Capture frame from video for Tesseract
        captureOcrBtn.addEventListener('click', async () => {
            const video = document.querySelector('#reader video');
            if (!video) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/png');
            await runOCR(imageData);
        });

        fileInput.addEventListener('change', async (e) => {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            
            // Try Barcode first
            const barcodeScanner = new Html5Qrcode("reader");
            try {
                const result = await barcodeScanner.scanFileV2(file, true);
                handleResult(result.decodedText, result.result.format.formatName);
            } catch (err) {
                // If barcode fails, try OCR
                await runOCR(file);
            } finally {
                fileInput.value = ""; 
            }
        });

        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            } else {
                showNotification("Please scan something first.");
            }
        });

        startBtn.addEventListener('click', startScanning);
        closeBtn.addEventListener('click', stopScanning);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
        window.addEventListener('pagehide', () => { if (isScanning) stopScanning(); });
    </script>
</body>
</html>
